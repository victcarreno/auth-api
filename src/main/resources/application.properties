# Configuración MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_auth_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=System

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# JWT Configuration
jwt.secret=EstaEsUnaClaveSecretaMuyLargaYSeguraParaJWT2026QueTieneMasDe32Caracteres
jwt.expiration=86400000

# Server
server.port=8081

# Debug logging
logging.level.org.springframework.security=DEBUG
logging.level.com.victor.auth_api=DEBUG